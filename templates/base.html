<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>{% block title %}Game Keeper{% endblock %}</title>
  <style>
    :root {
      --bg: #1a1b1e; --panel: #26272b; --panel-hi: #2f3036;
      --text: #e7e8ea; --muted: #9aa0a6; --line: #3a3b40;
      --up: #3ba55d; --down: #ed4245; --accent: #5865f2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 24px 16px 64px; }
    header.bar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    header.bar h1 { font-size: 20px; margin: 0; }
    .who { color: var(--muted); font-size: 13px; }
    .btn {
      display: inline-block; background: var(--accent); color: #fff;
      padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 600;
    }
    .btn.ghost { background: var(--panel-hi); color: var(--text); }
    .btn:hover { text-decoration: none; filter: brightness(1.08); }
    {% block style %}{% endblock %}
  </style>
</head>
<body>
  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
